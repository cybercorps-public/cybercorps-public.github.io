<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Outer octagon frame -->
  <polygon points="14,1 22,4 27,11 27,17 22,24 14,27 6,24 1,17 1,11 6,4"
    stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter" fill="none"/>
  <!-- Crosshair lines -->
  <line x1="14" y1="1"  x2="14" y2="6"  stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="14" y1="22" x2="14" y2="27" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="1"  y1="14" x2="6"  y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="22" y1="14" x2="27" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Inner diamond -->
  <polygon points="14,8 20,14 14,20 8,14"
    stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter" fill="none"/>
  <!-- Center dot -->
  <rect x="13" y="13" width="2" height="2" fill="currentColor"/>
</svg>
