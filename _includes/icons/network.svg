  <rect x="2.5"  y="17.5" width="3" height="3" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter" fill="none"/>
  <rect x="18.5" y="17.5" width="3" height="3" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter" fill="none"/>
  <!-- Connecting lines -->
  <line x1="12"  y1="4.5"  x2="4"   y2="17.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="12"  y1="4.5"  x2="20"  y2="17.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="5.5" y1="20.5" x2="18.5" y2="20.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
