<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-icon">{% include icons/logo.svg %}</span>
        <span class="logo-text">{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Головна</a>
        <a href="{{ '/tools/' | relative_url }}" {% if page.url contains 'tools' %}class="active"{% endif %}>Інструменти</a>
        <a href="{{ '/contributors/' | relative_url }}" {% if page.url contains 'contributors' %}class="active"{% endif %}>Контрибютори</a>
        <a href="{{ site.telegram_url }}" class="btn-tg" target="_blank" rel="noopener">
          {% include icons/telegram.svg %}
          Telegram
        </a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Слава Україні &mdash; Слава силам оборони &mdash; <a href="{{ site.telegram_url }}" target="_blank" rel="noopener">Приєднатись до спільноти</a></p>
    </div>
  </footer>

</body>
</html>
