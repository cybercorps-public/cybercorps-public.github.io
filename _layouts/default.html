<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="icon" href="{{ '/assets/img/favicon-32x32.png' | relative_url }}" sizes="32x32" type="image/png">
  <link rel="icon" href="{{ '/assets/img/favicon-16x16.png' | relative_url }}" sizes="16x16" type="image/png">
  <link rel="icon" href="{{ '/assets/img/favicon-32x32.png' | relative_url }}" sizes="any">
  <link rel="apple-touch-icon" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <meta name="theme-color" content="#0a1a10">
  <meta name="msapplication-TileColor" content="#0a1a10">
  <meta name="msapplication-TileImage" content="{{ '/assets/img/android-chrome-192x192.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/plyr.css' | relative_url }}">
</head>
<body>

<canvas id="camo-canvas"></canvas>
<div class="vignette"></div>
<div class="scanline"></div>

<header class="site-nav">
  <a class="logo" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — на головну">
    <span class="logo-frame"><img class="logo-mark" src="{{ '/assets/img/logo.png' | relative_url }}" alt="{{ site.title }}" width="102" height="64"></span>
    <span class="logo-text">{{ site.title }}</span>
  </a>
  <nav aria-label="Головна навігація">
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Головна</a></li>
      <li><a href="{{ '/tools/' | relative_url }}" {% if page.url contains 'tools' %}class="active"{% endif %}>Інструменти</a></li>
      <li><a href="{{ '/contributors/' | relative_url }}" {% if page.url contains 'contributors' %}class="active"{% endif %}>Контрибютори</a></li>
      <li class="keep">
        <a class="nav-tg" href="{{ site.telegram_url }}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21.9 4.6 18.8 19c-.2 1-.8 1.2-1.7.8l-4.6-3.4-2.2 2.1c-.3.3-.5.5-.9.5l.3-4.6L18.2 6c.4-.3-.1-.5-.6-.2L7.3 12.3 2.9 11c-1-.3-1-1 .2-1.4l17.5-6.7c.8-.3 1.5.2 1.3 1.7z"></path></svg>
          Telegram
        </a>
      </li>
    </ul>
  </nav>
</header>

<main id="top">
  {{ content }}
</main>

<footer>
  <span>© 2026 {{ site.title }} · Волонтерська кіберспільнота</span>
  <div class="footer-links">
    <a href="{{ site.telegram_url }}" target="_blank" rel="noopener">Telegram</a>
    <a href="{{ '/' | relative_url }}">Головна</a>
    <a href="{{ '/tools/' | relative_url }}">Інструменти</a>
  </div>
</footer>

<script src="{{ '/assets/js/plyr.min.js' | relative_url }}"></script>
<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
